<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f4f7fc;
            padding: 16px 12px;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-wrapper {
            background: #0f3b5e;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,20,40,0.1);
        }
        .icon-wrapper i {
            font-size: 24px;
            color: #facc15;
        }
        h1 {
            font-weight: 400;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            color: #0b2a41;
        }
        h1 span {
            font-weight: 600;
        }
        .drive-header-btn {
            background: white;
            border: 1.5px solid #dde7f0;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #0f3b5e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .drive-header-btn i {
            color: #4285f4;
        }
        .drive-header-btn.connected {
            background: #e8f0fe;
            border-color: #4285f4;
        }
        .drive-header-btn.connected i {
            color: #34a853;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 22px;
            padding: 18px 16px;
            box-shadow: 0 10px 25px -5px rgba(0,20,40,0.08);
            border: 1px solid #ffffff70;
            margin-bottom: 20px;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-row label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #54738f;
        }
        .input-row input, .input-row select {
            padding: 12px 14px;
            border: 1.5px solid #dde7f0;
            border-radius: 16px;
            font-size: 1rem;
            background: white;
            width: 100%;
        }
        .datetime-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .datetime-row .input-row {
            flex: 1;
        }
        .icon-btn {
            background: white;
            border: 1.5px solid #dde7f0;
            width: 48px;

            border-radius: 16px;

            color: #0f3b5e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .btn-primary {
            background: #0f3b5e;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;

            box-shadow: 0 6px 12px #0f3b5e30;

            align-items: center;
            justify-content: center;

            margin-top: 8px;
        }
        .btn-excel {

            box-shadow: 0 6px 12px #1e6f5c30;
        }
        .filtros-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }
        .filtro-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filtro-chip {
            background: white;
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            border: 1px solid #dde7f0;
            flex: 1;

        .filtro-chip i {
            color: #0f3b5e;

        .filtro-chip select, .filtro-chip input {

            padding: 12px 0;
            font-size: 0.95rem;

            outline: none;

        }
        .table-wrapper {
            overflow-x: auto;
            margin-top: 8px;
            border-radius: 16px;
            background: white;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;

        }
        th {
            text-align: left;

        }
        td {
            padding: 10px;

        .categoria-badge {
            background: #dee9f2;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e07a5f;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.15s;
        }
        .delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 18px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid #eef3f9;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f3b5e;
        }
        .stat-label {
            color: #5f7d99;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .graficos-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .chart-container {
            background: white;
            padding: 16px 12px;
            border-radius: 20px;
        }
        canvas {
            max-height: 220px;
            width: 100% !important;
        }
        @media (max-width: 640px) {
            .graficos-row {
                grid-template-columns: 1fr;
            }
        }
        .app-footer {
            margin-top: 30px;
            padding: 20px 0 10px;
            text-align: center;
            border-top: 1px solid #dde7f0;
        }
        .dev-signature {
            font-size: 1rem;
            color: #1e293b;
        }
        .dev-signature strong {
            color: #0f3b5e;
        }
        .contact-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            background: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(37,211,102,0.2);
        }
        .total-mes {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 12px;
            text-align: right;
        }
        .empty-message {
            text-align: center;
            padding: 30px !important;
            color: #7c95aa;
        }
        .footer-note {
            margin-top: 5px;
            font-size: 0.75rem;
            color: #7c95aa;
            text-align: right;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #0f3b5e;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            text-align: center;
            z-index: 1000;
            animation: fadeInOut 3s ease;
            pointer-events: none;
        }
        @keyframes fadeInOut {
            0%,100% { opacity: 0; transform: translateY(10px); }
            10%,90% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" style="padding: 16px 12px;">

        <div class="table-wrapper">

                <thead><tr><th>Data/Hora</th><th>Categoria</th><th>Detalhe</th><th>Valor</th><th style="width:50px;"></th></tr></thead>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="graficos-row">

    <div class="graficos-stack" style="display: flex; flex-direction: column; gap: 20px;">

<script>
    (function(){
        // CREDENCIAIS CONFIGURADAS
        const CLIENT_ID = '197001942617-r0csvfj4shfkumja066c82p7okrt57ce.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCiFgVjyQNEBUCkdX78ujUMTRORAoHgUFI';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FILE_NAME = 'mapeamento_gastos.json';
        
        let tokenClient;
        let accessToken = null;
        let fileId = null;
        let isDriveConnected = false;
        let saveTimeout = null;

        const driveBtn = document.getElementById('driveConnectBtn');
        const driveBtnText = document.getElementById('driveBtnText');
        const syncIndicator = document.getElementById('syncIndicator');

        function showToast(message, isGood = true) {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.style.background = isGood ? '#0f3b5e' : '#e07a5f';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateDriveUI() {
            if (isDriveConnected) {
                driveBtn.classList.add('connected');
                driveBtnText.innerHTML = '<i class="fas fa-check-circle"></i> Drive conectado';
                syncIndicator.innerHTML = '<i class="fab fa-google-drive" style="color:#34a853;"></i> Auto-save ativo';
            } else {
                driveBtn.classList.remove('connected');
                driveBtnText.innerHTML = '<i class="fab fa-google-drive"></i> Conectar Drive';
                syncIndicator.innerHTML = '<i class="fas fa-cloud"></i> Backup local';
            }
        }

        function initGoogleAPI(){
    console.log('Iniciando Google API...');
    if (typeof gapi === 'undefined') {
        console.log('GAPI não carregou, tentando novamente em 1s...');
        setTimeout(initGoogleAPI, 1000);
        return;
    }
    gapi.load('client', async ()=>{
        console.log('GAPI client carregado!');
                try {
                    await gapi.client.init({
                        apiKey: API_KEY,
                        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
                    });
                    
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: SCOPES,
                        callback: async (tokenResponse) => {
                            if (tokenResponse.error) {
                                showToast('Erro ao conectar com Google Drive', false);
                                return;
                            }
                            accessToken = tokenResponse.access_token;
                            isDriveConnected = true;
                            updateDriveUI();
                            
                            const expiresIn = tokenResponse.expires_in || 3600;
                            const expiry = Date.now() + (expiresIn * 1000);
                            localStorage.setItem('drive_access_token', accessToken);
                            localStorage.setItem('drive_token_expiry', expiry.toString());
                            
                            await checkExistingFile();
                            showToast('Google Drive conectado! Salvamento automático ativado.');
                        },
                    });
                    
                    const savedToken = localStorage.getItem('drive_access_token');
                    const tokenExpiry = localStorage.getItem('drive_token_expiry');
                    if (savedToken && tokenExpiry && Date.now() < parseInt(tokenExpiry)) {
                        accessToken = savedToken;
                        isDriveConnected = true;
                        updateDriveUI();
                        await checkExistingFile();
                    }
                    
                    console.log('Google API inicializada com sucesso!');
                } catch (error) {
                    console.warn('Google API não inicializada:', error);
                }
            });
        }

        async function checkExistingFile() {
            if (!accessToken) return;
            try {
                const response = await gapi.client.drive.files.list({
                    q: `name='${FILE_NAME}' and trashed=false`,
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });
                if (response.result.files.length > 0) {
                    fileId = response.result.files[0].id;
                }
            } catch (err) {
                console.warn('Erro ao verificar arquivo:', err);
            }
        }

        async function autoSaveToDrive() {
            if (!isDriveConnected || !accessToken) return;
            
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    const dadosParaSalvar = gastos.map(g => ({
                        ...g,
                        data: g.data.toISOString()
                    }));
                    
                    const fileContent = JSON.stringify(dadosParaSalvar, null, 2);
                    const file = new Blob([fileContent], { type: 'application/json' });
                    
                    const metadata = {
                        name: FILE_NAME,
                        mimeType: 'application/json'
                    };
                    
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    form.append('file', file);
                    
                    let url, method;
                    
                    if (fileId) {
                        url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`;
                        method = 'PATCH';
                    } else {
                        url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
                        method = 'POST';
                    }
                    
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Authorization': `Bearer ${accessToken}` },
                        body: form
                    });
                    
                    const result = await response.json();
                    if (!fileId && result.id) fileId = result.id;
                    
                    syncIndicator.innerHTML = '<i class="fab fa-google-drive" style="color:#34a853;"></i> Sincronizado agora';
                    setTimeout(() => updateDriveUI(), 2000);
                    
                } catch (error) {
                    console.error('Erro no auto-save:', error);
                    syncIndicator.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro na sincronização';
                }
            }, 2000);
        }

        async function loadFromDrive() {
            if (!isDriveConnected || !accessToken) {
                showToast('Conecte-se ao Google Drive primeiro', false);
                return;
            }
            
            try {
                if (!fileId) {
                    await checkExistingFile();
                    if (!fileId) {
                        showToast('Nenhum backup encontrado no Drive', false);
                        return;
                    }
                }
                
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                const dadosCarregados = await response.json();
                gastos = dadosCarregados.map(g => ({...g, data: new Date(g.data)}));
                
                localStorage.setItem('gastos_backup', JSON.stringify(gastos));
                renderTudo();
                showToast(`${gastos.length} gastos carregados do Drive!`);
                
            } catch (error) {
                console.error('Erro ao carregar:', error);
                showToast('Erro ao carregar dados do Drive', false);
            }
        }

        driveBtn.addEventListener('click', async () => {
            if (!isDriveConnected) {
                if (tokenClient) {
                    tokenClient.requestAccessToken();
                } else {
                    showToast('Google API não está pronta. Tente recarregar.', false);
                }
            } else {
                await loadFromDrive();
            }
        });

        // DADOS DA APLICAÇÃO
        let gastos = [];
        
        const savedLocal = localStorage.getItem('gastos_backup');
        if (savedLocal) {
            try {
                const parsed = JSON.parse(savedLocal);
                gastos = parsed.map(g => ({...g, data: new Date(g.data)}));
            } catch(e) {}
        }

        const valorInput = document.getElementById('valorInput');
        const categoriaSelect = document.getElementById('categoriaSelect');
        const detalheInput = document.getElementById('detalheInput');
        const dataHoraInput = document.getElementById('dataHoraInput');
        const editDateTimeBtn = document.getElementById('editDateTimeBtn');
        const addBtn = document.getElementById('addGastoBtn');
        const mesFiltro = document.getElementById('mesFiltro');
        const categoriaFiltro = document.getElementById('categoriaFiltro');
        const tabelaBody = document.getElementById('tabelaBody');
        const totalMesDisplay = document.getElementById('totalMesDisplay');
        const statsGrid = document.getElementById('statsGrid');
        const picoHorarioSpan = document.getElementById('picoHorario');
        const exportExcelBtn = document.getElementById('exportExcelBtn');

        function setDateTimeNow() {
            const now = new Date();
            const tzOffset = now.getTimezoneOffset() * 60000;
            const localISO = new Date(now - tzOffset).toISOString().slice(0,16);
            dataHoraInput.value = localISO;
        }
        setDateTimeNow();
        editDateTimeBtn.addEventListener('click', setDateTimeNow);

        const hoje = new Date();
        mesFiltro.value = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;

        window.excluirGasto = function(index) {
            if (confirm('Tem certeza que deseja excluir este gasto?')) {
                gastos.splice(index, 1);
                localStorage.setItem('gastos_backup', JSON.stringify(gastos));
                if (isDriveConnected) autoSaveToDrive();
                renderTudo();
            }
        };

        function filtrarGastos() {
            const anoMes = mesFiltro.value;
            const catSelecionada = categoriaFiltro.value;
            let filtrados = gastos;
            
            if (anoMes) {
                const [ano, mes] = anoMes.split('-').map(Number);
                filtrados = filtrados.filter(g => g.data.getFullYear() === ano && g.data.getMonth() === mes-1);
            }
            if (catSelecionada !== 'TODAS') {
                filtrados = filtrados.filter(g => g.categoria === catSelecionada);
            }
            return filtrados;
        }

        function renderTudo() {
            const dadosFiltrados = filtrarGastos();
            renderTabela(dadosFiltrados);
            renderStatsEMedias(dadosFiltrados);
            renderGraficos(dadosFiltrados);
        }

        function renderTabela(lista) {
            let html = '';
            let total = 0;
            const listaOrdenada = [...lista].sort((a,b) => b.data - a.data);
            
            listaOrdenada.forEach(g => {
                total += g.valor;
                const dataFormat = g.data.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
                const originalIndex = gastos.indexOf(g);
                html += `<tr>
                    <td>${dataFormat}</td>
                    <td><span class="categoria-badge">${g.categoria}</span></td>
                    <td>${g.detalhe || '—'}</td>
                    <td>R$ ${g.valor.toFixed(2)}</td>
                    <td style="text-align:center;">
                        <button class="delete-btn" onclick="excluirGasto(${originalIndex})" title="Excluir gasto">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>`;
            });
            
            if (lista.length === 0) {
                html = `<tr><td colspan="5" class="empty-message">Nenhum gasto no período</td></tr>`;
            }
            
            tabelaBody.innerHTML = html;
            totalMesDisplay.innerText = `Total no período: R$ ${total.toFixed(2)}`;
        }

        function renderStatsEMedias(lista) {
            const anoMes = mesFiltro.value;
            if (!anoMes || lista.length === 0) {
                statsGrid.innerHTML = `<div class="stat-card"><div class="stat-value">R$ 0,00</div><div class="stat-label">média/dia</div></div>
                                       <div class="stat-card"><div class="stat-value">R$ 0,00</div><div class="stat-label">média/semana</div></div>
                                       <div class="stat-card"><div class="stat-value">R$ 0,00</div><div class="stat-label">total mês</div></div>
                                       <div class="stat-card"><div class="stat-value">R$ 0,00</div><div class="stat-label">média mensal/ano</div></div>`;
                picoHorarioSpan.innerText = '—';
                return;
            }
            
            const [ano, mes] = anoMes.split('-').map(Number);
            const diasNoMes = new Date(ano, mes, 0).getDate();
            const hojeRef = new Date();
            const diasPassados = (hojeRef.getFullYear() === ano && hojeRef.getMonth() === mes-1) ? hojeRef.getDate() : diasNoMes;
            
            const total = lista.reduce((s, g) => s + g.valor, 0);
            const mediaDia = diasPassados ? total / diasPassados : 0;
            const mediaSemana = total / ((diasPassados/7) || 1);
            
            const gastosAno = gastos.filter(g => g.data.getFullYear() === ano);
            const totalAno = gastosAno.reduce((s,g)=> s+g.valor,0);
            const mesesComGasto = new Set(gastosAno.map(g=> g.data.getMonth())).size || 1;
            const mediaAno = totalAno / mesesComGasto;

            statsGrid.innerHTML = `
                <div class="stat-card"><div class="stat-value">R$ ${mediaDia.toFixed(2)}</div><div class="stat-label">média/dia</div></div>
                <div class="stat-card"><div class="stat-value">R$ ${mediaSemana.toFixed(2)}</div><div class="stat-label">média/semana</div></div>
                <div class="stat-card"><div class="stat-value">R$ ${total.toFixed(2)}</div><div class="stat-label">total mês</div></div>
                <div class="stat-card"><div class="stat-value">R$ ${mediaAno.toFixed(2)}</div><div class="stat-label">média mensal/ano</div></div>
            `;

            const horas = lista.map(g => g.data.getHours());
            if(horas.length){
                const freq = horas.reduce((acc,h)=>{ acc[h]=(acc[h]||0)+1; return acc; },{});
                const maxHora = Object.keys(freq).sort((a,b)=> freq[b]-freq[a])[0];
                picoHorarioSpan.innerText = `${maxHora}h (${freq[maxHora]} gastos)`;
            } else {
                picoHorarioSpan.innerText = '—';
            }
        }

        let pizzaChart, pizzaSemanaChart, barChart, horariosChart;
        function renderGraficos(lista) {
            const ctxPizza = document.getElementById('pizzaChart').getContext('2d');
            const ctxPizzaSemana = document.getElementById('pizzaSemanaChart').getContext('2d');
            const ctxBar = document.getElementById('barrasDiaSemanaChart').getContext('2d');
            const ctxHorarios = document.getElementById('horariosChart').getContext('2d');
            
            const catMap = new Map();
            lista.forEach(g => catMap.set(g.categoria, (catMap.get(g.categoria)||0) + g.valor));
            const categorias = Array.from(catMap.keys());
            const valoresCat = Array.from(catMap.values());
            
            if(pizzaChart) pizzaChart.destroy();
            pizzaChart = new Chart(ctxPizza, {
                type: 'pie',
                data: {
                    labels: categorias.length ? categorias : ['Sem dados'],
                    datasets: [{
                        data: valoresCat.length ? valoresCat : [1],
                        backgroundColor: ['#0f3b5e','#2a6f97','#4a9eb5','#6ab0c7','#f9a03f','#e07a5f','#81b29a','#b56576','#6d597a','#e2c290','#9c89b8','#f0a6ca','#7cbd9b','#b8b8d1']
                    }]
                },
                options: { 
                    responsive: true, 
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 10 } }
                        } 
                    } 
                }
            });

            const semanasMap = new Map();
            lista.forEach(g => {
                const dia = g.data.getDate();
                const semana = Math.ceil(dia / 7);
                const chave = `Semana ${semana}`;
                semanasMap.set(chave, (semanasMap.get(chave) || 0) + g.valor);
            });
            
            const semanasOrdenadas = Array.from(semanasMap.keys()).sort((a,b) => parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]));
            const valoresSemanas = semanasOrdenadas.map(sem => semanasMap.get(sem));
            
            if(pizzaSemanaChart) pizzaSemanaChart.destroy();
            pizzaSemanaChart = new Chart(ctxPizzaSemana, {
                type: 'pie',
                data: {
                    labels: semanasOrdenadas.length ? semanasOrdenadas : ['Sem dados'],
                    datasets: [{
                        data: valoresSemanas.length ? valoresSemanas : [1],
                        backgroundColor: ['#0f3b5e','#2a6f97','#4a9eb5','#6ab0c7','#f9a03f','#e07a5f']
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 10 } }
                        }
                    } 
                }
            });

            const dias = [0,0,0,0,0,0,0];
            lista.forEach(g => { const d = g.data.getDay(); dias[d] += g.valor; });
            
            if(barChart) barChart.destroy();
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
                    datasets: [{
                        label: 'Gasto (R$)',
                        data: dias,
                        backgroundColor: '#2a6f97',
                        borderRadius: 4
                    }]
                },
                options: { 
                    responsive: true,
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });

            const horasDoDia = new Array(24).fill(0);
            lista.forEach(g => { const hora = g.data.getHours(); horasDoDia[hora] += g.valor; });
            const labelsHoras = Array.from({length: 24}, (_, i) => `${i}h`);
            
            if(horariosChart) horariosChart.destroy();
            horariosChart = new Chart(ctxHorarios, {
                type: 'bar',
                data: {
                    labels: labelsHoras,
                    datasets: [{
                        label: 'Gasto por horário (R$)',
                        data: horasDoDia,
                        backgroundColor: '#e07a5f',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: { 
                        y: { beginAtZero: true }, 
                        x: { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 12 } } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        addBtn.addEventListener('click', ()=>{
            const valor = parseFloat(valorInput.value);
            if(isNaN(valor) || valor <= 0) { alert('Informe um valor válido'); return; }
            const categoria = categoriaSelect.value;
            const detalhe = detalheInput.value.trim();
            if(!dataHoraInput.value) { alert('Data/hora inválida'); return; }
            const data = new Date(dataHoraInput.value);
            
            gastos.push({ valor, categoria, detalhe, data });
            valorInput.value = '';
            detalheInput.value = '';
            setDateTimeNow();
            
            localStorage.setItem('gastos_backup', JSON.stringify(gastos));
            if (isDriveConnected) autoSaveToDrive();
            renderTudo();
        });

        mesFiltro.addEventListener('change', renderTudo);
        categoriaFiltro.addEventListener('change', renderTudo);

        exportExcelBtn.addEventListener('click', ()=>{
            const dados = filtrarGastos();
            const wsData = [['Data/Hora', 'Categoria', 'Detalhe', 'Valor (R$)']];
            dados.forEach(g => {
                wsData.push([
                    g.data.toLocaleString('pt-BR'),
                    g.categoria,
                    g.detalhe || '',
                    g.valor.toFixed(2)
                ]);
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, 'Mapeamento');
            XLSX.writeFile(wb, `mapeamento_${mesFiltro.value||'todos'}.xlsx`);
        });

        // INICIALIZAÇÃO CORRIGIDA
       let tentativas = 0;
function tentarIniciarAPI() {
    if (tentativas < 5) {
        tentativas++;
        console.log(`Tentativa ${tentativas} de iniciar API...`);
        setTimeout(initGoogleAPI, 4000);
    } else {
        console.log('API não carregou após 5 tentativas. Recarregue a página.');
        showToast('Erro ao carregar Google API. Recarregue a página.', false);
    }
}
tentarIniciarAPI();
renderTudo();
    })();
</script>
</body>
</html>
